<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will You Go on a Date?</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          135deg,
          #ff6b9d 0%,
          #c86dd7 50%,
          #9b59b6 100%
        );
        padding: 15px;
        overflow-x: hidden;
      }

      .container {
        background: white;
        border-radius: 30px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
        max-width: 550px;
        width: 100%;
        backdrop-filter: blur(10px);
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .heart {
        font-size: 100px;
        margin-bottom: 20px;
        animation: heartbeat 1.2s infinite;
        display: inline-block;
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.15);
        }
        50% {
          transform: scale(1);
        }
      }

      h1 {
        color: #2d3436;
        font-size: 36px;
        margin: 15px 0;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .subtitle {
        color: #636e72;
        font-size: 17px;
        margin-bottom: 40px;
        font-weight: 500;
      }

      .button-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        min-height: 70px;
      }

      button {
        padding: 16px 45px;
        font-size: 17px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      .yes-btn {
        background: linear-gradient(135deg, #ff6b9d, #ee5a6f);
        color: white;
        min-width: 130px;
        font-size: 18px;
        flex-shrink: 0;
      }

      .yes-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 15px 35px rgba(255, 107, 107, 0.5);
      }

      .yes-btn:active {
        transform: scale(0.95);
      }

      .no-btn {
        background: linear-gradient(135deg, #dfe6e9, #b2bec3);
        color: #2d3436;
        min-width: 130px;
        font-weight: 700;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        flex-shrink: 0;
      }

      .no-btn:hover {
        background: linear-gradient(135deg, #b2bec3, #a4afb9);
      }

      .success-message {
        display: none;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.7);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .success-message h2 {
        color: #ff6b9d;
        font-size: 32px;
        margin: 20px 0;
        font-weight: 700;
      }

      .success-message p {
        color: #636e72;
        font-size: 17px;
        margin: 12px 0;
        font-weight: 500;
      }

      .celebration {
        font-size: 70px;
        animation: float 2s ease-in-out infinite;
        display: inline-block;
        margin: 10px 5px;
      }

      .celebration-line {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 15px 0;
        flex-wrap: wrap;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spin {
        animation: spin 1s linear infinite;
      }

      /* Mobile Optimization */
      @media (max-width: 768px) {
        body {
          padding: 12px;
        }

        .container {
          padding: 30px;
          border-radius: 25px;
        }

        h1 {
          font-size: 28px;
          margin: 12px 0;
        }

        .heart {
          font-size: 80px;
          margin-bottom: 15px;
        }

        .subtitle {
          font-size: 15px;
          margin-bottom: 30px;
        }

        .button-container {
          min-height: 65px;
          gap: 15px;
        }

        button {
          padding: 14px 40px;
          font-size: 16px;
          letter-spacing: 1px;
          min-width: 120px;
        }

        .yes-btn {
          font-size: 16px;
        }

        .celebration {
          font-size: 60px;
          margin: 8px 4px;
        }

        .success-message h2 {
          font-size: 28px;
        }

        .success-message p {
          font-size: 16px;
        }
      }

      @media (max-width: 480px) {
        .container {
          padding: 25px;
          border-radius: 20px;
        }

        h1 {
          font-size: 24px;
          margin: 10px 0;
        }

        .heart {
          font-size: 70px;
          margin-bottom: 12px;
        }

        .subtitle {
          font-size: 14px;
          margin-bottom: 25px;
        }

        .button-container {
          min-height: 60px;
          gap: 12px;
        }

        button {
          padding: 12px 35px;
          font-size: 15px;
          letter-spacing: 0.8px;
          min-width: 110px;
          border-radius: 45px;
        }

        .yes-btn {
          font-size: 15px;
        }

        .celebration {
          font-size: 50px;
          margin: 6px 3px;
        }

        .success-message h2 {
          font-size: 24px;
          margin: 15px 0;
        }

        .success-message p {
          font-size: 15px;
          margin: 8px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="question">
        <div class="heart">рҹ’•</div>
        <h1>Will You Go On A Date With Me?</h1>
        <p class="subtitle">Give it a try... I dare you to click no! рҹҳү</p>

        <div class="button-container">
          <button class="yes-btn" onclick="handleYes()">YES! рҹ’ҳ</button>
          <button
            class="no-btn"
            id="noBtn"
            onmouseenter="avoidCursor()"
            ontouchstart="avoidCursor()"
          >
            NO
          </button>
        </div>
      </div>

      <div id="success" class="success-message">
        <div class="celebration-line">
          <div class="celebration">рҹҺү</div>
          <div class="celebration">вңЁ</div>
          <div class="celebration">рҹҺү</div>
        </div>
        <h2>YES!!! рҹҘ°</h2>
        <p>You've made me the happiest person ever!</p>
        <p
          style="
            margin: 20px 0;
            font-size: 19px;
            color: #ff6b9d;
            font-weight: 700;
          "
        >
          You're absolutely wonderful! рҹ’•
        </p>
        <div class="celebration-line">
          <div class="celebration">пҝҪвҖҚвқӨпёҸвҖҚрҹ‘©</div>
          <div class="celebration">рҹ’ҳ</div>
          <div class="celebration">рҹ‘ЁвҖҚвқӨпёҸвҖҚрҹ‘©</div>
        </div>
        <p style="margin-top: 25px; font-size: 16px">
          Let's make this the best date ever... рҹҢ№
        </p>
      </div>
    </div>

    <script>
      const noBtn = document.getElementById("noBtn");
      const questionSection = document.getElementById("question");
      const successSection = document.getElementById("success");

      function avoidCursor() {
        // Generate random position with more dynamic movement
        const isMobile = window.innerWidth <= 768;

        // Move button away from cursor
        const containerRect = noBtn.parentElement.getBoundingClientRect();
        const containerCenterX = containerRect.left + containerRect.width / 2;
        const containerCenterY = containerRect.top + containerRect.height / 2;

        // Calculate random offset away from center - larger for mobile
        const offsetX = (Math.random() - 0.5) * (isMobile ? 250 : 350);
        const offsetY = (Math.random() - 0.5) * (isMobile ? 250 : 350);

        // Clamp to screen bounds
        const newLeft = Math.max(
          10,
          Math.min(containerCenterX + offsetX - 60, window.innerWidth - 140),
        );
        const newTop = Math.max(
          60,
          Math.min(containerCenterY + offsetY - 30, window.innerHeight - 100),
        );

        noBtn.style.position = "fixed";
        noBtn.style.left = newLeft + "px";
        noBtn.style.top = newTop + "px";
        noBtn.style.zIndex = "9999";

        // Add fun message with random excuses
        const excuses = [
          "You can't catch me! рҹҳҶ",
          "Not so fast! рҹҸғ",
          "Come on, try again! рҹҳң",
          "I'm too fast for you! вҡЎ",
          "You don't want to click that anyway! рҹҳҸ",
          "There's only YES here! рҹ’•",
          "Nice try! рҹҳ„",
          "Get me if you can! рҹҡҖ",
        ];

        // Randomly show a message (40% chance)
        if (Math.random() > 0.6) {
          const excuse = excuses[Math.floor(Math.random() * excuses.length)];
          // Optional: display in console for fun
        }
      }

      // Also handle when trying to click the button directly
      noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        avoidCursor();
        return false;
      });

      // Handle touch on mobile
      noBtn.addEventListener("touchmove", (e) => {
        e.preventDefault();
        e.stopPropagation();
        avoidCursor();
      });

      // Add touch event for mobile
      noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        e.stopPropagation();
        avoidCursor();
        return false;
      });

      // Prevent any default behavior on the button
      document.addEventListener("touchmove", (e) => {
        if (e.target === noBtn) {
          e.preventDefault();
        }
      });

      function handleYes() {
        questionSection.style.display = "none";
        successSection.style.display = "block";

        // Create confetti effect
        createConfetti();
      }

      function createConfetti() {
        const colors = [
          "#ff6b9d",
          "#ff8787",
          "#ffa5a5",
          "#ffe066",
          "#69db7c",
          "#a8e6cf",
          "#74b9ff",
          "#a29bfe",
        ];
        const emojis = ["рҹҺү", "рҹ’•", "вңЁ", "рҹҺҠ", "рҹ’ҳ", "рҹҢ№", "вӯҗ", "рҹ’–", "рҹ‘ЁвҖҚвқӨпёҸвҖҚрҹ‘©"];

        // Create more confetti pieces
        for (let i = 0; i < 80; i++) {
          const confetti = document.createElement("div");
          const useEmoji = Math.random() > 0.5;

          confetti.style.position = "fixed";
          confetti.style.left = Math.random() * 100 + "%";
          confetti.style.top = "-10px";
          confetti.style.pointerEvents = "none";
          confetti.style.zIndex = "9998";

          if (useEmoji) {
            confetti.style.fontSize = "24px";
            confetti.textContent =
              emojis[Math.floor(Math.random() * emojis.length)];
            confetti.style.animation = `fall ${Math.random() * 2 + 2.5}s linear`;
          } else {
            confetti.style.width = "10px";
            confetti.style.height = "10px";
            confetti.style.background =
              colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = "50%";
            confetti.style.animation = `fall ${Math.random() * 2 + 2.5}s linear`;
          }

          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }

      // Add confetti animation
      const style = document.createElement("style");
      style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
